<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>圖片切片 · HD 的工具箱</title>
  <meta name="description" content="上傳圖片，選欄數與列數，切成等分小圖，打包成 ZIP 下載 — 全部在瀏覽器裡完成。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/shared/app.css">
  <script src="/static/shared/theme.js"></script>
  <style>
    /* 圖片切片工具專屬樣式（共用元件在 app.css） */
    .slicer-counter { margin-top: var(--space-3); font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); }
    .slicer-counter b { color: var(--accent); font-weight: 500; }
    .slicer-stage { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .slicer-figure { position: relative; display: inline-block; line-height: 0; max-width: 100%; }
    .slicer-figure img { display: block; max-width: 100%; max-height: calc(100vh - 200px); border-radius: 6px; box-shadow: var(--shadow-sm); }
    .slicer-grid { position: absolute; inset: 0; pointer-events: none; }
    .slicer-grid .gl-v { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--accent); opacity: 0.72; }
    .slicer-grid .gl-h { position: absolute; left: 0; right: 0; height: 1px; background: var(--accent); opacity: 0.72; }
    .slicer-caption { margin-top: var(--space-3); text-align: center; font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); }
    .stepper-pair { display: flex; gap: var(--space-6); flex-wrap: wrap; }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="app-header__row">
      <a href="/" class="brand">HD 的工具箱</a>
      <span class="crumb-sep">/</span>
      <span class="crumb-cur">圖片切片</span>
      <span class="app-header__spacer"></span>
      <a href="/" class="btn btn--ghost" style="padding:6px 10px;font-size:13px">
        <svg class="icon icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        回工具箱
      </a>
      <button type="button" class="theme-toggle" id="themeToggle" aria-label="切換亮 / 暗模式" title="切換亮 / 暗模式">
        <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main class="app-main app-main--full">
    <div class="tool-layout">

      <!-- ===== 左：控制 ===== -->
      <div class="tool-layout__controls">

        <div class="section">
          <div class="section__label"><span class="section__num">01</span> 上傳圖片</div>
          <div class="dropzone" id="dropzone">
            <input type="file" id="fileInput" accept="image/*" hidden>
            <svg class="dropzone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8.5 10a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/><path d="M21 15l-5-5L5 21"/></svg>
            <div class="dropzone__title">拖曳圖片到這裡</div>
            <div class="dropzone__hint">或點擊選擇檔案（PNG / JPG / WEBP / GIF）</div>
            <span class="dropzone__file" id="fileName"></span>
          </div>
        </div>

        <div class="section">
          <div class="section__label"><span class="section__num">02</span> 切割設定</div>
          <div class="stepper-pair">
            <div>
              <span class="field-label">欄（水平數）</span>
              <div class="stepper" data-stepper="cols">
                <button type="button" class="stepper__btn" data-delta="-1" aria-label="減少欄數">−</button>
                <span class="stepper__val" id="colsVal">3</span>
                <button type="button" class="stepper__btn" data-delta="1" aria-label="增加欄數">+</button>
              </div>
            </div>
            <div>
              <span class="field-label">列（垂直數）</span>
              <div class="stepper" data-stepper="rows">
                <button type="button" class="stepper__btn" data-delta="-1" aria-label="減少列數">−</button>
                <span class="stepper__val" id="rowsVal">3</span>
                <button type="button" class="stepper__btn" data-delta="1" aria-label="增加列數">+</button>
              </div>
            </div>
          </div>
          <div class="slicer-counter"><b id="cntCols">3</b> 欄 × <b id="cntRows">3</b> 列 = <b id="cntTotal">9</b> 塊</div>
        </div>

        <div class="section">
          <div class="section__label"><span class="section__num">03</span> 輸出格式</div>
          <div class="segmented" id="formatSeg" role="group" aria-label="輸出格式">
            <button type="button" class="segmented__btn" data-format="png" aria-pressed="true">PNG</button>
            <button type="button" class="segmented__btn" data-format="jpg" aria-pressed="false">JPG</button>
            <button type="button" class="segmented__btn" data-format="webp" aria-pressed="false">WEBP</button>
          </div>
          <div class="mt-4 is-disabled-row" id="qualityRow">
            <span class="field-label">品質（JPG / WEBP）</span>
            <div class="range-field">
              <input type="range" id="qualitySlider" min="1" max="100" value="90" disabled>
              <span class="range-field__val" id="qualityVal">90%</span>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section__label"><span class="section__num">04</span> 檔名前綴（可留空）</div>
          <input type="text" class="text-field" id="prefixInput" value="split-" spellcheck="false" autocomplete="off" placeholder="留空 → 檔名為 1-1.png、1-2.png …">
        </div>

        <button type="button" class="btn btn--primary btn--block" id="sliceBtn" disabled>選擇圖片後開始切割</button>

        <div class="progress" id="progress">
          <div class="progress__header">
            <span class="progress__label">處理中</span>
            <span class="progress__status" id="progressStatus"></span>
          </div>
          <div class="progress__track"><div class="progress__bar" id="progressBar"></div></div>
        </div>

        <div class="message message--error" id="errorMsg">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
          <span id="errorText"></span>
        </div>
        <div class="message message--success" id="successMsg">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
          <span id="successText">切割完成，ZIP 已開始下載。</span>
        </div>
      </div>

      <!-- ===== 右：預覽 ===== -->
      <div class="tool-layout__preview" id="previewArea">
        <div class="preview-empty" id="previewEmpty">
          <svg class="preview-empty__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12"/></svg>
          <p>上傳圖片後預覽將顯示於此</p>
        </div>
        <div class="slicer-stage" id="previewStage" hidden>
          <div>
            <div class="slicer-figure">
              <img id="previewImg" alt="預覽">
              <div class="slicer-grid" id="previewGrid"></div>
            </div>
            <div class="slicer-caption" id="previewCaption"></div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
  (function () {
    var MIN = 1, MAX = 20, MAX_TILES = 400;
    var FORMAT = {
      png:  { mime: 'image/png',  ext: 'png',  lossy: false },
      jpg:  { mime: 'image/jpeg', ext: 'jpg',  lossy: true  },
      webp: { mime: 'image/webp', ext: 'webp', lossy: true  }
    };

    var $ = function (id) { return document.getElementById(id); };
    var els = {
      dropzone: $('dropzone'), fileInput: $('fileInput'), fileName: $('fileName'),
      colsVal: $('colsVal'), rowsVal: $('rowsVal'),
      cntCols: $('cntCols'), cntRows: $('cntRows'), cntTotal: $('cntTotal'),
      formatSeg: $('formatSeg'), qualityRow: $('qualityRow'), qualitySlider: $('qualitySlider'), qualityVal: $('qualityVal'),
      prefixInput: $('prefixInput'), sliceBtn: $('sliceBtn'),
      progress: $('progress'), progressBar: $('progressBar'), progressStatus: $('progressStatus'),
      errorMsg: $('errorMsg'), errorText: $('errorText'), successMsg: $('successMsg'), successText: $('successText'),
      previewEmpty: $('previewEmpty'), previewStage: $('previewStage'), previewImg: $('previewImg'),
      previewGrid: $('previewGrid'), previewCaption: $('previewCaption')
    };

    var state = { cols: 3, rows: 3, format: 'png', img: null, imgURL: null, busy: false };

    function clamp(n) { return Math.max(MIN, Math.min(MAX, n)); }
    function showError(msg) { els.errorText.textContent = msg; els.errorMsg.classList.add('is-shown'); els.successMsg.classList.remove('is-shown'); }
    function showSuccess(msg) { els.successText.textContent = msg; els.successMsg.classList.add('is-shown'); els.errorMsg.classList.remove('is-shown'); }
    function hideMessages() { els.errorMsg.classList.remove('is-shown'); els.successMsg.classList.remove('is-shown'); }
    function sanitizePrefix(p) { return (p || '').trim().replace(/[\\\/:*?"<>|]+/g, '_'); }

    // n 等分 total，回傳 n+1 個切點（含 0 與 total）；最後一段吃餘數，避免邊緣掉像素
    function tileEdges(total, n) {
      var base = Math.floor(total / n), edges = [0], acc = 0;
      for (var i = 0; i < n; i++) { acc += (i === n - 1) ? (total - acc) : base; edges.push(acc); }
      return edges;
    }

    function syncCounter() {
      var c = state.cols, r = state.rows;
      els.colsVal.textContent = c; els.rowsVal.textContent = r;
      els.cntCols.textContent = c; els.cntRows.textContent = r; els.cntTotal.textContent = c * r;
      document.querySelectorAll('.stepper').forEach(function (st) {
        var key = st.getAttribute('data-stepper'), v = state[key];
        st.querySelector('[data-delta="-1"]').disabled = (v <= MIN) || state.busy;
        st.querySelector('[data-delta="1"]').disabled = (v >= MAX) || state.busy;
      });
    }

    function syncQualityRow() {
      var lossy = FORMAT[state.format].lossy;
      els.qualitySlider.disabled = !lossy || state.busy;
      els.qualityRow.classList.toggle('is-disabled-row', !lossy);
    }

    function syncSliceBtn() {
      els.sliceBtn.disabled = !state.img || state.busy;
      if (!state.img) els.sliceBtn.textContent = '選擇圖片後開始切割';
      else if (state.busy) els.sliceBtn.textContent = '處理中…';
      else els.sliceBtn.textContent = '開始切割（' + (state.cols * state.rows) + ' 塊）';
    }

    function renderGridOverlay() {
      els.previewGrid.replaceChildren();
      if (!state.img) return;
      var W = state.img.naturalWidth, H = state.img.naturalHeight;
      var xs = tileEdges(W, state.cols), ys = tileEdges(H, state.rows), i;
      for (i = 1; i < xs.length - 1; i++) {
        var v = document.createElement('div'); v.className = 'gl-v';
        v.style.left = (xs[i] / W * 100) + '%'; els.previewGrid.appendChild(v);
      }
      for (i = 1; i < ys.length - 1; i++) {
        var h = document.createElement('div'); h.className = 'gl-h';
        h.style.top = (ys[i] / H * 100) + '%'; els.previewGrid.appendChild(h);
      }
    }

    function updateCaption() {
      if (!state.img) return;
      var W = state.img.naturalWidth, H = state.img.naturalHeight;
      els.previewCaption.textContent = '原圖 ' + W + ' × ' + H + ' ｜ 每塊約 ' + Math.floor(W / state.cols) + ' × ' + Math.floor(H / state.rows) + ' px';
    }

    function refreshPreview() {
      if (state.img) { renderGridOverlay(); updateCaption(); }
      syncCounter(); syncSliceBtn();
    }

    function loadFile(file) {
      hideMessages();
      if (!file) return;
      if (!file.type || file.type.indexOf('image/') !== 0) { showError('請選擇圖片檔（PNG / JPG / WEBP / GIF 等）。'); return; }
      if (state.imgURL) { URL.revokeObjectURL(state.imgURL); state.imgURL = null; }
      var url = URL.createObjectURL(file);
      var img = new Image();
      img.onload = function () {
        if (!img.naturalWidth || !img.naturalHeight) { URL.revokeObjectURL(url); showError('無法讀取這張圖片的尺寸。'); return; }
        state.img = img; state.imgURL = url;
        els.fileName.textContent = file.name + '  ·  ' + img.naturalWidth + '×' + img.naturalHeight;
        els.fileName.classList.add('is-shown');
        els.previewImg.src = url;
        els.previewEmpty.hidden = true; els.previewStage.hidden = false;
        refreshPreview();
      };
      img.onerror = function () { URL.revokeObjectURL(url); showError('這個檔案無法當作圖片載入。'); };
      img.src = url;
    }

    function canvasToBlob(canvas, mime, quality) {
      return new Promise(function (resolve, reject) {
        canvas.toBlob(function (blob) { blob ? resolve(blob) : reject(new Error('產生圖片失敗（' + mime + '）')); }, mime, quality);
      });
    }

    async function doSlice() {
      if (!state.img || state.busy) return;
      var cols = state.cols, rows = state.rows, total = cols * rows;
      if (total > MAX_TILES) { showError('一次最多 ' + MAX_TILES + ' 塊，目前 ' + total + ' 塊太多了。'); return; }
      if (typeof JSZip === 'undefined') { showError('打包元件（JSZip）載入失敗，請檢查網路連線後重新整理頁面。'); return; }

      var fmt = FORMAT[state.format];
      var quality = fmt.lossy ? (parseInt(els.qualitySlider.value, 10) / 100) : undefined;
      var prefix = sanitizePrefix(els.prefixInput.value); // 可為空字串
      var W = state.img.naturalWidth, H = state.img.naturalHeight;
      var xs = tileEdges(W, cols), ys = tileEdges(H, rows);

      state.busy = true; hideMessages();
      syncSliceBtn(); syncCounter(); syncQualityRow();
      els.progress.classList.add('is-shown');
      els.progressBar.style.width = '0%';
      els.progressStatus.textContent = '切割中… 0 / ' + total;

      try {
        var zip = new JSZip(), done = 0;
        for (var r = 0; r < rows; r++) {
          for (var c = 0; c < cols; c++) {
            var sx = xs[c], sy = ys[r], sw = xs[c + 1] - sx, sh = ys[r + 1] - sy;
            var canvas = document.createElement('canvas');
            canvas.width = sw; canvas.height = sh;
            canvas.getContext('2d').drawImage(state.img, sx, sy, sw, sh, 0, 0, sw, sh);
            var blob = await canvasToBlob(canvas, fmt.mime, quality);
            // 命名：[前綴]列-欄（預設前綴 split- → split-1-1.png；前綴留空 → 1-1.png；依列再依欄）
            var stem = (r + 1) + '-' + (c + 1);
            zip.file(prefix + stem + '.' + fmt.ext, blob);
            done++;
            els.progressBar.style.width = Math.round(done / total * 80) + '%';
            els.progressStatus.textContent = '切割中… ' + done + ' / ' + total;
            if (done % 8 === 0) await new Promise(function (res) { setTimeout(res, 0); });
          }
        }
        els.progressStatus.textContent = '打包中…';
        var content = await zip.generateAsync(
          { type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } },
          function (meta) { els.progressBar.style.width = (80 + Math.round(meta.percent * 0.18)) + '%'; }
        );
        els.progressBar.style.width = '100%';
        els.progressStatus.textContent = '完成';

        var dlURL = URL.createObjectURL(content);
        var a = document.createElement('a');
        a.href = dlURL; a.download = prefix + 'slices.zip';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(dlURL);

        setTimeout(function () { els.progress.classList.remove('is-shown'); }, 500);
        showSuccess('已切成 ' + total + ' 塊（' + fmt.ext.toUpperCase() + '），ZIP 已開始下載。');
      } catch (e) {
        els.progress.classList.remove('is-shown');
        showError(e && e.message ? e.message : '切割失敗。');
      } finally {
        state.busy = false;
        syncSliceBtn(); syncCounter(); syncQualityRow();
      }
    }

    // ---- events ----
    els.dropzone.addEventListener('click', function () { els.fileInput.click(); });
    els.dropzone.addEventListener('dragover', function (e) { e.preventDefault(); els.dropzone.classList.add('is-dragover'); });
    els.dropzone.addEventListener('dragleave', function (e) { e.preventDefault(); els.dropzone.classList.remove('is-dragover'); });
    els.dropzone.addEventListener('drop', function (e) {
      e.preventDefault(); els.dropzone.classList.remove('is-dragover');
      if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
    });
    els.fileInput.addEventListener('change', function (e) { if (e.target.files.length) loadFile(e.target.files[0]); });

    document.querySelectorAll('.stepper').forEach(function (st) {
      var key = st.getAttribute('data-stepper');
      st.querySelectorAll('.stepper__btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          if (state.busy) return;
          state[key] = clamp(state[key] + parseInt(btn.getAttribute('data-delta'), 10));
          refreshPreview();
        });
      });
    });

    els.formatSeg.querySelectorAll('.segmented__btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        if (state.busy) return;
        state.format = btn.getAttribute('data-format');
        els.formatSeg.querySelectorAll('.segmented__btn').forEach(function (b) { b.setAttribute('aria-pressed', b === btn ? 'true' : 'false'); });
        syncQualityRow();
      });
    });

    els.qualitySlider.addEventListener('input', function () { els.qualityVal.textContent = els.qualitySlider.value + '%'; });
    els.sliceBtn.addEventListener('click', doSlice);

    // ---- init ----
    syncCounter(); syncQualityRow(); syncSliceBtn();
  })();
  </script>
</body>
</html>
