<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HD 的工具箱</title>
  <meta name="description" content="一個個趁手的前端小工具：PDF 轉 JPG、圖片切片，陸續增加。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/shared/app.css">
  <script src="/static/shared/theme.js"></script>
</head>
<body>

  <header class="app-header">
    <div class="app-header__row">
      <a href="/" class="brand">HD 的工具箱</a>
      <span class="app-header__spacer"></span>
      <button type="button" class="theme-toggle" id="themeToggle" aria-label="切換亮 / 暗模式" title="切換亮 / 暗模式">
        <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main class="app-main app-main--wide">
    <section class="hero">
      <p class="hero__eyebrow">HD 的工具箱</p>
      <h1>趁手的前端小工具，<br>一個個收進<span class="accent">工具箱</span></h1>
      <p>每個工具都直接打開就能用。能在瀏覽器裡做完的，檔案就不會離開你的電腦。</p>
    </section>

    <section class="tool-grid">
      <a href="/pdf2jpg" class="tool-card">
        <svg class="tool-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h8M8 9h2"/></svg>
        <h3>PDF to JPG</h3>
        <p>把 PDF 每一頁轉成 JPG，可調解析度與品質，打包成 ZIP 下載。</p>
      </a>

      <a href="/image-slicer" class="tool-card">
        <svg class="tool-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
        <h3>圖片切片</h3>
        <p>上傳圖片，選欄數與列數，切成等分小圖，打包成 ZIP 下載。</p>
        <span class="tool-card__tag">即將推出</span>
      </a>

      <div class="tool-card tool-card--soon" aria-disabled="true">
        <svg class="tool-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
        <h3>更多工具</h3>
        <p>陸續加入。有想要的小工具歡迎提。</p>
        <span class="tool-card__tag">coming soon</span>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>HD 的工具箱 · made by <a href="https://github.com/" rel="noopener">Jackie Yeh</a></p>
  </footer>

</body>
</html>
